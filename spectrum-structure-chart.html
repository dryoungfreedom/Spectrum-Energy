<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Structure Chart — Electron Configuration Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0A0A14;color:#E0E0F0;font-family:'Inter','Segoe UI',sans-serif;padding:24px 28px;min-height:100vh;}
  h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#9B59B6,#3498DB,#2ECC71,#F1C40F);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .subtitle{font-size:13px;color:#555568;margin-top:4px;}
  .section-label{font-size:10px;color:#555568;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
  .group-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .group-btn{background:rgba(255,255,255,0.04);color:#888;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:400;transition:all 0.2s ease;}
  .group-btn:hover{border-color:rgba(255,255,255,0.2);}
  .group-btn.active{color:#FFF;font-weight:700;background:#3498DB;border-color:#3498DB;}
  .group-info{font-size:11px;color:#888;margin-top:6px;line-height:1.5;}
  .group-shell{font-family:'JetBrains Mono',monospace;color:#F1C40F;font-weight:700;}
  .matrix-container{overflow-x:auto;margin-top:16px;}
  .matrix{border-collapse:collapse;width:100%;}
  .matrix th,.matrix td{padding:4px 3px;text-align:center;font-size:10px;border:1px solid rgba(255,255,255,0.04);}
  .matrix th{color:#777;font-weight:600;position:sticky;top:0;background:#0A0A14;z-index:2;}
  .matrix th.band-header{writing-mode:vertical-lr;text-orientation:mixed;padding:8px 4px;font-size:10px;height:90px;}
  .matrix th.el-header{text-align:left;padding-left:8px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;min-width:80px;position:sticky;left:0;background:#0A0A14;z-index:3;}
  .matrix td.el-name-cell{text-align:left;padding-left:8px;font-size:10px;color:#666;position:sticky;left:0;background:#0A0A14;z-index:1;}
  .matrix-cell{border-radius:3px;padding:3px 2px;font-size:8px;line-height:1.2;min-width:60px;cursor:default;}
  .matrix-cell .role-dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin:0 1px;vertical-align:middle;}
  .matrix th.band-sep-header{width:4px;min-width:4px;max-width:4px;padding:0;border:none;background:rgba(255,255,255,0.08);}
  .matrix td.band-sep-cell{width:4px;min-width:4px;max-width:4px;padding:0;border:none;background:rgba(255,255,255,0.04);}
  .pattern-section{margin-top:24px;background:#12121F;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:20px;}
  .pattern-title{font-size:11px;color:#666680;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
  .pattern-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  .pattern-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px;}
  .pattern-card-title{font-size:12px;font-weight:700;margin-bottom:6px;}
  .pattern-card-body{font-size:11px;color:#999;line-height:1.5;}
  .pattern-card-highlight{color:#F1C40F;font-weight:600;}
  .prediction-card{border-color:rgba(241,196,15,0.3);background:rgba(241,196,15,0.05);}
  .prediction-label{font-size:9px;color:#F1C40F;font-weight:700;letter-spacing:1px;margin-bottom:4px;}
  .no-group-msg{text-align:center;padding:60px 20px;color:#444;font-size:14px;}
  .detail-panel{background:#12121F;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:20px;margin-top:16px;display:none;}
  .detail-panel.open{display:block;}
  .detail-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .detail-symbol{font-size:36px;font-weight:800;color:#E8E8F0;font-family:'JetBrains Mono',monospace;}
  .detail-name{font-size:18px;color:#8888AA;margin-left:12px;}
  .detail-z{font-size:14px;color:#555568;margin-left:8px;}
  .detail-config{font-size:12px;color:#6666AA;margin-top:4px;font-family:'JetBrains Mono',monospace;}
  .detail-predicted-note{font-size:10px;color:#B7950B;margin-top:6px;font-style:italic;}
  .close-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:#888;cursor:pointer;border-radius:6px;padding:4px 10px;font-size:13px;font-family:inherit;}
  .close-btn:hover{border-color:rgba(255,255,255,0.3);}
  .detail-section-label{font-size:11px;color:#666680;text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 10px 0;}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
  .detail-band-card{background:rgba(255,255,255,0.02);border-radius:6px;padding:8px 10px;border:1px solid rgba(255,255,255,0.05);}
  .detail-band-card.highlighted{background:rgba(255,255,255,0.08);}
  .detail-band-name{font-size:11px;font-weight:600;margin-bottom:4px;}
  .detail-role-badge{font-size:10px;padding:2px 6px;border-radius:3px;display:inline-block;margin-right:3px;margin-bottom:2px;}
  .detail-no-data{font-size:10px;color:#444;}
  .footer{margin-top:28px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:#333348;line-height:1.8;}
  .footer strong{color:#555568;}
  .footer .copyright{color:#666680;margin-top:8px;font-size:11px;}
  .nav-links{display:flex;gap:8px;flex-wrap:wrap;}
  .nav-link{font-size:12px;color:#4A90D9;text-decoration:none;border:1px solid #4A90D9;border-radius:6px;padding:6px 14px;transition:all 0.2s;display:inline-block;}
  .nav-link:hover{background:rgba(74,144,217,0.15);}
  .predicted-legend{display:flex;align-items:center;gap:6px;font-size:10px;color:#777790;margin-bottom:16px;}
  .predicted-legend-swatch{width:16px;height:12px;border:1px dashed rgba(255,200,50,0.5);border-radius:2px;background:transparent;}
  .group-category{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-top:12px;margin-bottom:6px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);}
  .group-category:first-child{border-top:none;margin-top:0;padding-top:0;}
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px">
  <div>
    <h1>Spectrum Structure Chart</h1>
    <p class="subtitle">Electron Configuration → Energy Behavior Correlation · 11 Bands · Pattern Discovery · Prediction Engine</p>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="spectrum-energy-chart.html">→ General Chart</a>
    <a class="nav-link" href="spectrum-control-chart.html">→ Control Chart</a>
  </div>
</div>

<div style="margin-bottom:20px">
  <div class="section-label">Select Structural Group</div>
  <div id="groupBar"></div>
  <div class="group-info" id="groupInfo"></div>
</div>
<div class="predicted-legend"><div class="predicted-legend-swatch"></div> <span style="color:rgba(255,200,50,0.7)">★</span> Predicted / inferred behavior</div>

<div id="mainContent"></div>
<div id="patternSection" class="pattern-section" style="display:none"></div>
<div class="detail-panel" id="detailPanel"></div>
<div class="footer" id="footer"></div>

<script src="spectrum-data.js"></script>
<script>
let selectedGroup=null, selectedElement=null;
const RC=ROLE_COLORS;

function getRF(id){return ROLES.find(r=>r.id===id);}
function getBF(id){return ALL_BANDS.find(b=>b.id===id);}
function getEl(sym){return ELEMENTS.find(e=>e.symbol===sym);}

function renderGroupBar(){
  const bar=document.getElementById('groupBar');bar.innerHTML='';
  const categories=[
    {label:"Orbital Type",groups:["s1","s2","d_half","d_full","d_partial","f_partial","f_full","p1","p2","p3","p4","p5","p6"]},
    {label:"Special Properties",groups:["ferro","supercon"]}
  ];
  categories.forEach(cat=>{
    const catLabel=document.createElement('div');catLabel.className='group-category';catLabel.textContent=cat.label;bar.appendChild(catLabel);
    const row=document.createElement('div');row.className='group-bar';
    cat.groups.forEach(gid=>{
      const grp=STRUCTURE_GROUPS.find(g=>g.id===gid);if(!grp)return;
      const btn=document.createElement('button');
      btn.className='group-btn'+(selectedGroup===gid?' active':'');
      btn.textContent=grp.name+' ('+grp.elements.length+')';
      btn.onclick=()=>{selectedGroup=selectedGroup===gid?null:gid;selectedElement=null;render();};
      row.appendChild(btn);
    });
    bar.appendChild(row);
  });
  const info=document.getElementById('groupInfo');
  if(selectedGroup){
    const grp=STRUCTURE_GROUPS.find(g=>g.id===selectedGroup);
    info.innerHTML='<span class="group-shell">'+grp.shell+'</span> — '+grp.desc+' · '+grp.elements.length+' elements';
  }else{info.textContent='';}
}

function renderMain(){
  const main=document.getElementById('mainContent');main.innerHTML='';
  if(!selectedGroup){
    main.innerHTML='<div class="no-group-msg">Select a structural group above to see how electron configuration correlates with energy behavior across all bands.<br><br>Elements with similar structures often share functional roles — EM spectrum, thermal, and kinetic particle bands all strengthen these correlations.</div>';
    return;
  }
  const grp=STRUCTURE_GROUPS.find(g=>g.id===selectedGroup);
  const els=grp.elements.map(sym=>getEl(sym)).filter(Boolean).sort((a,b)=>a.Z-b.Z);

  // Build the matrix
  const container=document.createElement('div');container.className='matrix-container';
  const table=document.createElement('table');table.className='matrix';

  // Header row
  const thead=document.createElement('thead');
  const headerRow=document.createElement('tr');
  const cornerTh=document.createElement('th');cornerTh.textContent='Element';cornerTh.style.cssText='text-align:left;min-width:100px;';
  headerRow.appendChild(cornerTh);
  const configTh=document.createElement('th');configTh.textContent='Config';configTh.style.cssText='text-align:left;min-width:120px;font-size:9px;';
  headerRow.appendChild(configTh);

  // EM band headers
  const emLabel=document.createElement('th');emLabel.className='band-sep-header';emLabel.textContent='EM';emLabel.style.cssText='font-size:8px;color:#555;letter-spacing:1px;';headerRow.appendChild(emLabel);
  EM_BANDS.forEach(band=>{
    const th=document.createElement('th');th.className='band-header';th.textContent=band.name;th.style.color=band.color;
    headerRow.appendChild(th);
  });
  // Separator + Thermal
  const sepTh1=document.createElement('th');sepTh1.className='band-sep-header';sepTh1.textContent='TH';sepTh1.style.cssText='font-size:8px;color:#555;letter-spacing:1px;';headerRow.appendChild(sepTh1);
  THERMAL_BANDS.forEach(band=>{
    const th=document.createElement('th');th.className='band-header';th.textContent=band.name;th.style.color=band.color;
    headerRow.appendChild(th);
  });
  // Separator + Kinetic
  const sepTh2=document.createElement('th');sepTh2.className='band-sep-header';sepTh2.textContent='KN';sepTh2.style.cssText='font-size:8px;color:#555;letter-spacing:1px;';headerRow.appendChild(sepTh2);
  KINETIC_BANDS.filter(b=>b.developed).forEach(band=>{
    const th=document.createElement('th');th.className='band-header';th.textContent=band.name;th.style.color=band.color;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);table.appendChild(thead);

  // Body rows — one per element
  const tbody=document.createElement('tbody');
  els.forEach(el=>{
    const row=document.createElement('tr');
    row.style.cursor='pointer';
    row.onclick=()=>{selectedElement=(selectedElement&&selectedElement.symbol===el.symbol)?null:el;render();};
    if(selectedElement&&selectedElement.symbol===el.symbol)row.style.background='rgba(255,255,255,0.06)';

    // Element symbol cell
    const symCell=document.createElement('th');symCell.className='el-header';
    symCell.style.color=el.p?'rgba(255,200,50,0.7)':'#CCCCDD';
    symCell.textContent=(el.p?'★ ':'')+el.symbol+' ';
    const nameSpan=document.createElement('span');nameSpan.style.cssText='font-size:9px;font-weight:400;color:#666;';
    nameSpan.textContent=el.name;
    symCell.appendChild(nameSpan);
    row.appendChild(symCell);

    // Config cell
    const configCell=document.createElement('td');configCell.style.cssText='text-align:left;padding-left:8px;font-family:"JetBrains Mono",monospace;font-size:10px;color:#6666AA;white-space:nowrap;';
    configCell.textContent=el.config;
    row.appendChild(configCell);

    // EM band cells
    const emSepTd=document.createElement('td');emSepTd.className='band-sep-cell';emSepTd.style.width='2px';row.appendChild(emSepTd);
    EM_BANDS.forEach(band=>{
      const td=document.createElement('td');
      const roles=el.bands[band.id]||[];
      if(roles.length===0){
        td.style.color='#222';td.textContent='—';
      }else{
        const cellDiv=document.createElement('div');cellDiv.className='matrix-cell';
        roles.forEach(r=>{
          const dot=document.createElement('span');dot.className='role-dot';
          dot.style.background=RC[r]?RC[r].bg:'#333';
          dot.style.border='1px solid '+(RC[r]?RC[r].text:'#555');
          dot.title=r;
          cellDiv.appendChild(dot);
        });
        td.appendChild(cellDiv);
      }
      row.appendChild(td);
    });

    // Thermal separator + cells
    const thSepTd=document.createElement('td');thSepTd.className='band-sep-cell';thSepTd.style.width='2px';row.appendChild(thSepTd);
    THERMAL_BANDS.forEach(band=>{
      const td=document.createElement('td');
      const roles=el.bands[band.id]||[];
      if(roles.length===0){
        td.style.color='#222';td.textContent='—';
      }else{
        const cellDiv=document.createElement('div');cellDiv.className='matrix-cell';
        roles.forEach(r=>{
          const dot=document.createElement('span');dot.className='role-dot';
          dot.style.background=RC[r]?RC[r].bg:'#333';
          dot.style.border='1px solid '+(RC[r]?RC[r].text:'#555');
          dot.title=r;
          cellDiv.appendChild(dot);
        });
        td.appendChild(cellDiv);
      }
      row.appendChild(td);
    });

    // Kinetic separator + cells
    const knSepTd=document.createElement('td');knSepTd.className='band-sep-cell';knSepTd.style.width='2px';row.appendChild(knSepTd);
    KINETIC_BANDS.filter(b=>b.developed).forEach(band=>{
      const td=document.createElement('td');
      const roles=el.bands[band.id]||[];
      if(roles.length===0){
        td.style.color='#222';td.textContent='—';
      }else{
        const cellDiv=document.createElement('div');cellDiv.className='matrix-cell';
        roles.forEach(r=>{
          const dot=document.createElement('span');dot.className='role-dot';
          dot.style.background=RC[r]?RC[r].bg:'#333';
          dot.style.border='1px solid '+(RC[r]?RC[r].text:'#555');
          dot.title=r;
          cellDiv.appendChild(dot);
        });
        td.appendChild(cellDiv);
      }
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  table.appendChild(tbody);container.appendChild(table);main.appendChild(container);

  // Legend for matrix dots
  const legend=document.createElement('div');
  legend.style.cssText='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;';
  ROLES.forEach(role=>{
    const item=document.createElement('div');item.style.cssText='display:flex;align-items:center;gap:4px;';
    const dot=document.createElement('span');dot.style.cssText='display:inline-block;width:8px;height:8px;border-radius:2px;background:'+RC[role.id].bg+';border:1px solid '+RC[role.id].text+';';
    const label=document.createElement('span');label.style.cssText='font-size:9px;color:#777;';label.textContent=role.icon+' '+role.name;
    item.appendChild(dot);item.appendChild(label);legend.appendChild(item);
  });
  main.appendChild(legend);
}

function analyzePatterns(){
  const section=document.getElementById('patternSection');
  if(!selectedGroup){section.style.display='none';return;}
  section.style.display='block';
  const grp=STRUCTURE_GROUPS.find(g=>g.id===selectedGroup);
  const els=grp.elements.map(sym=>getEl(sym)).filter(Boolean);

  let html='<div class="pattern-title">Pattern Analysis for '+grp.name+' ('+grp.shell+') — All 11 Bands</div><div class="pattern-grid">';

  // Analyze: for each band, what role do MOST elements in this group share?
  ALL_BANDS.forEach(band=>{
    const roleCounts={};
    els.forEach(el=>{
      const roles=el.bands[band.id]||[];
      roles.forEach(r=>{roleCounts[r]=(roleCounts[r]||0)+1;});
    });
    if(Object.keys(roleCounts).length===0)return;
    const sorted=Object.entries(roleCounts).sort((a,b)=>b[1]-a[1]);
    const dominant=sorted[0];
    const pct=Math.round(dominant[1]/els.length*100);
    const dominantRole=getRF(dominant[0]);

    if(pct>=60){
      html+='<div class="pattern-card"><div class="pattern-card-title" style="color:'+band.color+'">'+band.name+'</div>';
      html+='<div class="pattern-card-body"><span class="pattern-card-highlight">'+pct+'%</span> of this group act as <span style="color:'+RC[dominant[0]].text+'">'+dominantRole.icon+' '+dominantRole.name+'s</span>';
      if(sorted.length>1){
        html+=' · Also: '+sorted.slice(1,3).map(s=>{
          const ro=getRF(s[0]);
          return '<span style="color:'+(RC[s[0]]?RC[s[0]].text:'#888')+'">'+ro.icon+' '+ro.name+' ('+s[1]+')</span>';
        }).join(', ');
      }
      html+='</div></div>';
    }
  });

  // Find outliers: elements that DON'T match the dominant pattern
  const outliers=[];
  ALL_BANDS.forEach(band=>{
    const roleCounts={};
    els.forEach(el=>{
      const roles=el.bands[band.id]||[];
      roles.forEach(r=>{roleCounts[r]=(roleCounts[r]||0)+1;});
    });
    const sorted=Object.entries(roleCounts).sort((a,b)=>b[1]-a[1]);
    if(sorted.length===0)return;
    const dominant=sorted[0][0];
    const pct=Math.round(sorted[0][1]/els.length*100);
    if(pct<60)return;
    els.forEach(el=>{
      const roles=el.bands[band.id]||[];
      if(!roles.includes(dominant)){
        outliers.push({el:el,band:band,expected:dominant,actual:roles});
      }
    });
  });

  if(outliers.length>0){
    html+='<div class="pattern-card prediction-card" style="grid-column:1/-1"><div class="prediction-label">⚡ ANOMALIES & PREDICTION TARGETS</div>';
    html+='<div class="pattern-card-body">These elements deviate from their structural group\'s dominant behavior — either they have unique properties worth investigating, or they may have undocumented capabilities matching the group pattern:<br><br>';
    const seen=new Set();
    outliers.forEach(o=>{
      const key=o.el.symbol+'-'+o.band.id;
      if(seen.has(key))return;seen.add(key);
      const expRole=getRF(o.expected);
      html+='<span style="color:#E8E8F0;font-weight:600">'+o.el.symbol+'</span> in <span style="color:'+o.band.color+'">'+o.band.name+'</span>: group predicts <span style="color:'+RC[o.expected].text+'">'+expRole.icon+' '+expRole.name+'</span> but element shows <span style="color:'+(o.actual.length>0&&RC[o.actual[0]]?RC[o.actual[0]].text:'#666')+'">'+o.actual.map(r=>{const ro=getRF(r);return ro?ro.icon+' '+ro.name:'?';}).join(', ')+'</span>'+(o.el.p?' (predicted)':'')+'<br>';
    });
    html+='</div></div>';
  }

  // Summary stats
  html+='<div class="pattern-card" style="grid-column:1/-1"><div class="pattern-card-title" style="color:#3498DB">Group Summary</div>';
  html+='<div class="pattern-card-body">';
  html+='Elements: '+els.length+' · Predicted: '+els.filter(e=>e.p).length+' · Documented: '+els.filter(e=>!e.p).length+'<br>';
  const allRolesUsed=new Set();
  els.forEach(el=>{ALL_BANDS.forEach(band=>{(el.bands[band.id]||[]).forEach(r=>allRolesUsed.add(r));});});
  html+='Roles observed across 11 bands: '+Array.from(allRolesUsed).map(r=>{const ro=getRF(r);return '<span style="color:'+RC[r].text+'">'+ro.icon+' '+ro.name+'</span>';}).join(' · ');
  html+='</div></div>';

  html+='</div>';
  section.innerHTML=html;
}

function renderDetail(){
  const panel=document.getElementById('detailPanel');
  if(!selectedElement){panel.className='detail-panel';panel.innerHTML='';return;}
  panel.className='detail-panel open';const el=selectedElement;
  let h='<div class="detail-top"><div><span class="detail-symbol">'+el.symbol+'</span><span class="detail-name">'+el.name+'</span><span class="detail-z">Z = '+el.Z+'</span></div><button class="close-btn" onclick="selectedElement=null;render();">✕</button></div>';
  h+='<div class="detail-config">'+el.config+'</div>';
  if(el.p)h+='<div class="detail-predicted-note">★ EM band behaviors predicted/inferred from atomic structure and group trends.</div>';
  // Show which groups this element belongs to
  const memberOf=STRUCTURE_GROUPS.filter(g=>g.elements.includes(el.symbol));
  if(memberOf.length>0){
    h+='<div class="detail-section-label">Structural Groups</div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">';
    memberOf.forEach(g=>{
      h+='<span style="font-size:11px;background:rgba(52,152,219,0.15);border:1px solid rgba(52,152,219,0.3);border-radius:4px;padding:3px 8px;color:#3498DB">'+g.name+' ('+g.shell+')</span>';
    });
    h+='</div>';
  }

  // EM Spectrum
  h+='<div class="detail-section-label">EM Spectrum</div><div class="detail-grid">';
  EM_BANDS.forEach(band=>{const roles=el.bands[band.id]||[];const bs='border:1px solid rgba(255,255,255,0.05)';
    h+='<div class="detail-band-card" style="'+bs+'"><div class="detail-band-name" style="color:'+band.color+'">'+band.name+'</div>';
    if(roles.length>0){roles.forEach(r=>{const ro=getRF(r);if(ro)h+='<span class="detail-role-badge" style="background:'+RC[r].bg+';color:'+RC[r].text+'">'+ro.icon+' '+r+'</span>';});}
    else{h+='<span class="detail-no-data">No data</span>';}
    h+='</div>';});
  h+='</div>';

  // Thermal
  h+='<div class="detail-section-label">Thermal</div><div class="detail-grid">';
  THERMAL_BANDS.forEach(band=>{const roles=el.bands[band.id]||[];const bs='border:1px solid rgba(255,255,255,0.05)';
    h+='<div class="detail-band-card" style="'+bs+'"><div class="detail-band-name" style="color:'+band.color+'">'+band.name+'</div>';
    if(roles.length>0){roles.forEach(r=>{const ro=getRF(r);if(ro)h+='<span class="detail-role-badge" style="background:'+RC[r].bg+';color:'+RC[r].text+'">'+ro.icon+' '+r+'</span>';});}
    else{h+='<span class="detail-no-data">No data</span>';}
    h+='</div>';});
  h+='</div>';

  // Kinetic Particles
  h+='<div class="detail-section-label">Kinetic Particles</div><div class="detail-grid">';
  KINETIC_BANDS.filter(b=>b.developed).forEach(band=>{const roles=el.bands[band.id]||[];const bs='border:1px solid rgba(255,255,255,0.05)';
    h+='<div class="detail-band-card" style="'+bs+'"><div class="detail-band-name" style="color:'+band.color+'">'+band.name+'</div>';
    if(roles.length>0){roles.forEach(r=>{const ro=getRF(r);if(ro)h+='<span class="detail-role-badge" style="background:'+RC[r].bg+';color:'+RC[r].text+'">'+ro.icon+' '+r+'</span>';});}
    else{h+='<span class="detail-no-data">No data</span>';}
    h+='</div>';});
  h+='</div>';
  panel.innerHTML=h;
}

function renderFooter(){
  const pred=ELEMENTS.filter(e=>e.p).length;const meas=ELEMENTS.length-pred;
  document.getElementById('footer').innerHTML='<strong>Spectrum Structure Chart</strong> — '+ELEMENTS.length+' elements, '+ALL_BANDS.length+' energy bands ('+EM_BANDS.length+' EM + '+THERMAL_BANDS.length+' thermal + '+KINETIC_BANDS.filter(b=>b.developed).length+' kinetic), '+STRUCTURE_GROUPS.length+' structural groups. Correlates electron configuration with energy behavior to reveal patterns and generate prediction targets.<div class="copyright">© 2026 David R. Young — Spectrum Energy Research Corp<br>Spectrum Energy Research Framework · All Rights Reserved</div>';
}

function render(){renderGroupBar();renderMain();analyzePatterns();renderDetail();renderFooter();}
render();
</script>
