<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Compounds Chart — Chemical Compound Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0A0A14;color:#E0E0F0;font-family:'Inter','Segoe UI',sans-serif;padding:24px 28px;min-height:100vh;}
  h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#D4AF37,#E9C46A,#2A9D8F,#6A0572);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .subtitle{font-size:13px;color:#555568;margin-top:4px;}
  .section-label{font-size:10px;color:#555568;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
  .band-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .band-btn{background:rgba(255,255,255,0.04);color:#888;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:400;transition:all 0.2s ease;}
  .band-btn:hover{border-color:rgba(255,255,255,0.2);}
  .band-btn.active{color:#FFF;font-weight:700;}
  .band-sep{width:1px;height:28px;background:rgba(255,255,255,0.12);margin:0 4px;flex-shrink:0;}
  .band-info{font-size:11px;color:#555568;margin-top:6px;}

  /* View toggle */
  .view-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:3px;width:fit-content;}
  .view-btn{background:none;color:#666;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all 0.2s;letter-spacing:0.3px;}
  .view-btn:hover{color:#AAA;}
  .view-btn.active{background:rgba(255,255,255,0.1);color:#E0E0F0;}

  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:0;}
  .legend-item{display:flex;align-items:center;gap:4px;}
  .legend-swatch{width:10px;height:10px;border-radius:2px;}
  .legend-label{font-size:9px;color:#777790;}
  .search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .search-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px 14px;color:#E0E0F0;font-family:inherit;font-size:13px;width:240px;outline:none;}
  .search-input::placeholder{color:#444;}
  .search-input:focus{border-color:rgba(255,255,255,0.25);}
  .compound-count{font-size:11px;color:#444458;}

  .role-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .role-column{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px;min-height:60px;}
  .role-header{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;}
  .role-header-name{font-size:13px;font-weight:700;}
  .role-header-count{font-size:10px;color:#555;margin-left:auto;}
  .role-desc{font-size:9px;color:#555568;margin-bottom:8px;}
  .role-empty{font-size:11px;color:#FF4444;font-style:italic;font-weight:600;}
  .role-elements{display:flex;flex-wrap:wrap;gap:4px;}

  /* Compound cards */
  .cmp-card{background:#1C1C2E;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:8px 10px;cursor:pointer;transition:all 0.3s ease;min-width:80px;text-align:center;position:relative;}
  .cmp-card:hover{border-color:rgba(255,255,255,0.25);}
  .cmp-card.selected{border:2px solid #F0F0F0;}
  .cmp-card.dimmed{opacity:0.15;}
  .cmp-formula{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2;color:#CCCCDD;}
  .cmp-name{font-size:8px;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .cmp-density{font-size:8px;color:rgba(255,255,255,0.3);font-family:'JetBrains Mono',monospace;}
  .cmp-cat-badge{position:absolute;top:2px;right:4px;font-size:6px;padding:1px 4px;border-radius:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .cmp-secondary-roles{display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap;}
  .cmp-sec-badge{font-size:7px;padding:1px 4px;border-radius:3px;text-transform:uppercase;letter-spacing:0.5px;}

  /* Default grid (no band selected) */
  .default-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}

  /* Detail panel */
  .detail-panel{background:#12121F;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:20px;margin-top:16px;display:none;}
  .detail-panel.open{display:block;}
  .detail-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .detail-formula{font-size:28px;font-weight:800;color:#E8E8F0;font-family:'JetBrains Mono',monospace;}
  .detail-name{font-size:16px;color:#8888AA;margin-left:12px;}
  .detail-density{font-size:13px;color:#555568;margin-left:8px;}
  .detail-elements{font-size:12px;color:#6666AA;margin-top:4px;font-family:'JetBrains Mono',monospace;}
  .detail-notes{font-size:11px;color:#888899;margin-top:8px;line-height:1.5;max-width:700px;}
  .close-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:#888;cursor:pointer;border-radius:6px;padding:4px 10px;font-size:13px;font-family:inherit;}
  .close-btn:hover{border-color:rgba(255,255,255,0.3);}
  .detail-section-label{font-size:11px;color:#666680;text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 10px 0;}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
  .detail-band-card{background:rgba(255,255,255,0.02);border-radius:6px;padding:8px 10px;border:1px solid rgba(255,255,255,0.05);}
  .detail-band-card.highlighted{background:rgba(255,255,255,0.08);}
  .detail-band-name{font-size:11px;font-weight:600;margin-bottom:4px;}
  .detail-role-badge{font-size:10px;padding:2px 6px;border-radius:3px;display:inline-block;margin-right:3px;margin-bottom:2px;}
  .detail-no-data{font-size:10px;color:#444;}

  .info-line{font-size:11px;color:#444458;margin-bottom:12px;}
  .info-highlight{font-weight:600;}

  /* Gap analysis panel */
  .group-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.08);}
  .group-label{font-size:13px;font-weight:800;letter-spacing:2px;}
  .group-desc{font-size:10px;color:#666;font-weight:400;letter-spacing:0;}
  .group-section{margin-bottom:24px;}
  .gap-panel{background:#12121F;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:20px;margin-top:16px;}
  .gap-title{font-size:11px;color:#666680;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
  .gap-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .gap-item{border-radius:6px;padding:8px 12px;min-width:100px;}
  .gap-item-label{font-size:9px;font-weight:700;letter-spacing:1px;}
  .gap-item-name{font-size:12px;font-weight:600;margin-top:2px;}
  .gap-item-status{font-size:10px;margin-top:4px;}
  .gap-item-detail{font-size:9px;margin-top:2px;opacity:0.7;}

  .no-band-msg{text-align:center;padding:60px 20px;color:#444;font-size:14px;}

  /* New badge for compound contributions */
  .new-badge{font-size:8px;color:#D4AF37;background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.3);border-radius:3px;padding:1px 5px;margin-left:6px;font-weight:700;letter-spacing:0.5px;}

  .footer{margin-top:28px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);font-size:10px;color:#333348;line-height:1.8;}
  .footer strong{color:#555568;}
  .footer .copyright{color:#666680;margin-top:8px;font-size:11px;}
  .nav-link{font-size:12px;color:#4A90D9;text-decoration:none;border:1px solid #4A90D9;border-radius:6px;padding:6px 14px;transition:all 0.2s;display:inline-block;}
  .nav-link:hover{background:rgba(74,144,217,0.15);}
  .nav-links{display:flex;gap:8px;flex-wrap:wrap;}
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px">
  <div>
    <h1>Spectrum Compounds Chart</h1>
    <p class="subtitle">Chemical Compounds Classified by Energy Band · 11 Bands · Gap Analysis</p>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="spectrum-energy-chart.html">← General Chart</a>
    <a class="nav-link" href="spectrum-control-chart.html">→ Control Chart</a>
  </div>
</div>

<!-- View Toggle -->
<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">
  <div class="view-toggle" id="viewToggle">
    <button class="view-btn active" data-view="general">GENERAL</button>
    <button class="view-btn" data-view="gap">GAP ANALYSIS</button>
  </div>
  <span style="font-size:10px;color:#444458" id="viewDesc">What does each compound do across all bands?</span>
</div>

<div style="margin-bottom:20px">
  <div class="section-label">Select Energy Band <span style="color:#777;text-transform:none;letter-spacing:normal;font-style:italic">(click again to toggle off)</span></div>
  <div class="band-bar" id="bandBar"></div>
  <div class="band-info" id="bandInfo"></div>
</div>
<div style="display:flex;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px">
  <div class="legend" id="legend"></div>
</div>
<div class="search-bar">
  <input type="text" class="search-input" id="searchInput" placeholder="Search compounds...">
  <span class="compound-count" id="compoundCount"></span>
</div>
<div class="info-line" id="infoLine"></div>
<div id="mainContent"></div>
<div id="gapPanel" class="gap-panel" style="display:none"></div>
<div class="detail-panel" id="detailPanel"></div>
<div class="footer" id="footer"></div>

<script src="spectrum-data.js"></script>
<script>
let selectedBand=null,selectedCompound=null,searchText="",currentView="general";
const RC=ROLE_COLORS;

function getRF(id){return ROLES.find(r=>r.id===id);}
function getBF(id){return ALL_BANDS.find(b=>b.id===id);}
function getFiltered(){
  if(!searchText)return COMPOUNDS;
  const q=searchText.toLowerCase();
  return COMPOUNDS.filter(c=>
    c.formula.toLowerCase().includes(q)||
    c.name.toLowerCase().includes(q)||
    c.category.toLowerCase().includes(q)||
    c.elements.some(e=>e.toLowerCase().includes(q))
  );
}

// Get element roles for a band (for gap comparison)
function getElementRolesForBand(bandId){
  const roles={};
  ROLES.forEach(r=>{roles[r.id]=[];});
  ELEMENTS.forEach(el=>{
    const elRoles=el.bands[bandId]||[];
    elRoles.forEach(r=>{if(roles[r])roles[r].push(el);});
  });
  return roles;
}

// Get compound roles for a band
function getCompoundRolesForBand(bandId,filtered){
  const roles={};
  ROLES.forEach(r=>{roles[r.id]=[];});
  (filtered||COMPOUNDS).forEach(c=>{
    const cRoles=c.bands[bandId]||[];
    cRoles.forEach(r=>{if(roles[r])roles[r].push(c);});
  });
  return roles;
}

function renderBandBar(){
  const bar=document.getElementById('bandBar');bar.innerHTML='';
  function addLabel(text){const l=document.createElement('span');l.style.cssText='font-size:9px;color:#555;letter-spacing:1px;padding:0 4px;align-self:center;';l.textContent=text;bar.appendChild(l);}
  function addSep(){const s=document.createElement('div');s.className='band-sep';bar.appendChild(s);}
  function addBtns(bands){bands.forEach(band=>{
    const btn=document.createElement('button');
    btn.className='band-btn'+(selectedBand===band.id?' active':'');
    btn.textContent=band.name;
    if(selectedBand===band.id){btn.style.background=band.color;btn.style.borderColor=band.color;}
    btn.onclick=()=>{selectedBand=selectedBand===band.id?null:band.id;selectedCompound=null;render();};
    bar.appendChild(btn);
  });}
  addLabel('EM');addBtns(EM_BANDS);addSep();addLabel('THERMAL');addBtns(THERMAL_BANDS);addSep();addLabel('KINETIC');addBtns(KINETIC_BANDS.filter(b=>b.developed));
  // Band info
  const info=document.getElementById('bandInfo');
  if(selectedBand){
    const b=getBF(selectedBand);
    if(b.wavelength) info.textContent='Wavelength: '+b.wavelength+' · Frequency: '+b.freq;
    else info.textContent=b.desc;
  } else { info.textContent=''; }
}

function renderLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  ROLES.forEach(role=>{
    const item=document.createElement('div');item.className='legend-item';
    const sw=document.createElement('div');sw.className='legend-swatch';sw.style.background=RC[role.id].bg;sw.style.border='1px solid '+RC[role.id].text;
    const lb=document.createElement('span');lb.className='legend-label';lb.textContent=role.icon+' '+role.name;
    item.appendChild(sw);item.appendChild(lb);leg.appendChild(item);
  });
}

function createCard(cmp){
  const roles=selectedBand?(cmp.bands[selectedBand]||[]):[];
  const pr=roles[0];
  const rc=pr?RC[pr]:{bg:'#1C1C2E',text:'#8888AA'};
  const card=document.createElement('div');
  let cls='cmp-card';
  if(selectedCompound&&selectedCompound.id===cmp.id)cls+=' selected';
  if(selectedBand&&roles.length===0)cls+=' dimmed';
  card.className=cls;
  if(selectedBand&&roles.length>0)card.style.background=rc.bg;
  card.onclick=()=>{selectedCompound=(selectedCompound&&selectedCompound.id===cmp.id)?null:cmp;render();};

  // Category badge
  const cat=COMPOUND_CATEGORIES.find(c=>c.id===cmp.category);
  if(cat){
    const cb=document.createElement('div');cb.className='cmp-cat-badge';
    cb.style.background=cat.color+'22';cb.style.color=cat.color;
    cb.textContent=cat.name.slice(0,5);card.appendChild(cb);
  }

  const formula=document.createElement('div');formula.className='cmp-formula';
  formula.style.color=selectedBand&&roles.length>0?rc.text:'#CCCCDD';
  formula.textContent=cmp.formula;

  const nm=document.createElement('div');nm.className='cmp-name';nm.textContent=cmp.name;

  const dens=document.createElement('div');dens.className='cmp-density';dens.textContent=cmp.density+' g/cm³';

  card.appendChild(formula);card.appendChild(nm);card.appendChild(dens);

  if(selectedBand&&roles.length>1){
    const sd=document.createElement('div');sd.className='cmp-secondary-roles';
    roles.slice(1).forEach(r=>{
      if(!RC[r])return;
      const b=document.createElement('span');b.className='cmp-sec-badge';
      b.style.background=RC[r].bg;b.style.color=RC[r].text;
      b.textContent=r.slice(0,4);sd.appendChild(b);
    });
    card.appendChild(sd);
  }
  return card;
}

function renderGeneral(){
  const main=document.getElementById('mainContent');
  const info=document.getElementById('infoLine');
  main.innerHTML='';
  const filtered=getFiltered();
  document.getElementById('compoundCount').textContent=filtered.length+' of '+COMPOUNDS.length+' compounds';

  if(!selectedBand){
    info.textContent='All compounds — select an energy band above to reorganize by functional role';
    const grid=document.createElement('div');grid.className='default-grid';
    filtered.forEach(c=>{grid.appendChild(createCard(c));});
    main.appendChild(grid);
  }else{
    const bo=getBF(selectedBand);
    info.innerHTML='Compounds classified by function for <span class="info-highlight" style="color:'+bo.color+'">'+bo.name+'</span>';
    const groups={};ROLES.forEach(r=>{groups[r.id]=[];});
    filtered.forEach(c=>{
      const roles=c.bands[selectedBand]||[];
      roles.forEach(r=>{if(groups[r])groups[r].push(c);});
    });
    const grid=document.createElement('div');grid.className='role-grid';
    ROLES.forEach(role=>{
      const col=document.createElement('div');col.className='role-column';
      const hdr=document.createElement('div');hdr.className='role-header';hdr.style.borderBottom='2px solid '+RC[role.id].bg;
      const ic=document.createElement('span');ic.style.fontSize='16px';ic.textContent=role.icon;
      const nm=document.createElement('span');nm.className='role-header-name';nm.style.color=RC[role.id].text;nm.textContent=role.name;
      const ct=document.createElement('span');ct.className='role-header-count';ct.textContent=groups[role.id].length;
      hdr.appendChild(ic);hdr.appendChild(nm);hdr.appendChild(ct);col.appendChild(hdr);
      const desc=document.createElement('div');desc.className='role-desc';desc.textContent=role.desc;col.appendChild(desc);
      if(groups[role.id].length===0){
        const em=document.createElement('div');em.className='role-empty';em.style.color='#444';em.style.fontWeight='400';em.textContent='No compounds classified';col.appendChild(em);
      }else{
        const ed=document.createElement('div');ed.className='role-elements';
        groups[role.id].forEach(c=>{ed.appendChild(createCard(c));});
        col.appendChild(ed);
      }
      grid.appendChild(col);
    });
    main.appendChild(grid);
  }
}

function renderGapAnalysis(){
  const main=document.getElementById('mainContent');
  const info=document.getElementById('infoLine');
  main.innerHTML='';
  const filtered=getFiltered();
  document.getElementById('compoundCount').textContent=filtered.length+' of '+COMPOUNDS.length+' compounds';

  if(!selectedBand){
    info.textContent='Select an energy band above to see gap analysis — elements vs compounds';
    main.innerHTML='<div class="no-band-msg">Select an energy band to compare element-only control vs element + compound control.<br><br>This view reveals where compounds fill gaps that pure elements cannot — across all bands: EM spectrum, thermal, and kinetic particles.</div>';
    document.getElementById('gapPanel').style.display='none';
    return;
  }

  const bo=getBF(selectedBand);
  info.innerHTML='Gap analysis for <span class="info-highlight" style="color:'+bo.color+'">'+bo.name+'</span> — Elements vs Compounds';

  const elRoles=getElementRolesForBand(selectedBand);
  const cmpRoles=getCompoundRolesForBand(selectedBand,filtered);

  // Build the Start → Change → Stop layout showing both elements and compounds
  CONTROL_GROUPS.forEach(gd=>{
    const section=document.createElement('div');section.className='group-section';
    const gh=document.createElement('div');gh.className='group-header';
    const gl=document.createElement('span');gl.className='group-label';gl.style.color=gd.color;gl.textContent=gd.label;
    const gdesc=document.createElement('span');gdesc.className='group-desc';gdesc.textContent=' — '+gd.desc;

    // Count gaps that remain after adding compounds
    const remainingGaps=gd.roles.filter(rid=>{
      const hasElements=elRoles[rid]&&elRoles[rid].length>0;
      const hasCompounds=cmpRoles[rid]&&cmpRoles[rid].length>0;
      return !hasElements&&!hasCompounds;
    }).length;

    // Count gaps filled by compounds
    const filledByCompounds=gd.roles.filter(rid=>{
      const hasElements=elRoles[rid]&&elRoles[rid].length>0;
      const hasCompounds=cmpRoles[rid]&&cmpRoles[rid].length>0;
      return !hasElements&&hasCompounds;
    }).length;

    gh.appendChild(gl);gh.appendChild(gdesc);

    if(filledByCompounds>0&&gd.id!=='other'){
      const fb=document.createElement('span');
      fb.style.cssText='font-size:10px;color:#D4AF37;background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.3);border-radius:4px;padding:2px 8px;margin-left:auto;font-weight:700;';
      fb.textContent='+'+filledByCompounds+' FILLED BY COMPOUNDS';
      gh.appendChild(fb);
    }
    if(remainingGaps>0&&gd.id!=='other'){
      const gb=document.createElement('span');
      gb.style.cssText='font-size:10px;color:#FF4444;background:rgba(255,50,50,0.15);border:1px solid rgba(255,50,50,0.3);border-radius:4px;padding:2px 8px;margin-left:'+(filledByCompounds>0?'8px':'auto')+';font-weight:700;';
      gb.textContent=remainingGaps+' GAP'+(remainingGaps>1?'S':'')+' REMAIN';
      gh.appendChild(gb);
    }

    section.appendChild(gh);
    const grid=document.createElement('div');grid.className='role-grid';

    gd.roles.forEach(rid=>{
      const role=getRF(rid);if(!role)return;
      const hasElements=elRoles[rid]&&elRoles[rid].length>0;
      const hasCompounds=cmpRoles[rid]&&cmpRoles[rid].length>0;
      const hasGap=!hasElements&&!hasCompounds;
      const filledByCmp=!hasElements&&hasCompounds;

      const col=document.createElement('div');col.className='role-column';
      if(hasGap&&gd.id!=='other')col.style.border='1px dashed rgba(255,50,50,0.3)';
      if(filledByCmp)col.style.border='1px solid rgba(212,175,55,0.4)';

      const hdr=document.createElement('div');hdr.className='role-header';
      let borderColor=RC[rid].bg;
      if(hasGap&&gd.id!=='other')borderColor='rgba(255,50,50,0.3)';
      if(filledByCmp)borderColor='rgba(212,175,55,0.5)';
      hdr.style.borderBottom='2px solid '+borderColor;

      const ic=document.createElement('span');ic.style.fontSize='16px';ic.textContent=role.icon;
      const nm=document.createElement('span');nm.className='role-header-name';
      nm.style.color=hasGap&&gd.id!=='other'?'#FF6666':(filledByCmp?'#D4AF37':RC[rid].text);
      nm.textContent=role.name;

      // Counts
      const elCount=elRoles[rid]?elRoles[rid].length:0;
      const cmpCount=cmpRoles[rid]?cmpRoles[rid].length:0;
      const ct=document.createElement('span');ct.className='role-header-count';
      ct.innerHTML=elCount+'<span style="color:#555"> el</span>';
      if(cmpCount>0)ct.innerHTML+=' + <span style="color:#D4AF37">'+cmpCount+' cmp</span>';

      hdr.appendChild(ic);hdr.appendChild(nm);hdr.appendChild(ct);col.appendChild(hdr);

      const desc=document.createElement('div');desc.className='role-desc';desc.textContent=role.desc;col.appendChild(desc);

      if(hasGap){
        const em=document.createElement('div');em.className='role-empty';
        em.textContent=gd.id==='other'?'None':'⚠ NO KNOWN MATERIALS — Research needed';
        col.appendChild(em);
      }else{
        // Show element summary
        if(hasElements){
          const elSummary=document.createElement('div');
          elSummary.style.cssText='font-size:9px;color:#555;margin-bottom:6px;';
          elSummary.textContent=elCount+' element'+(elCount!==1?'s':'')+' (see Control Chart)';
          col.appendChild(elSummary);
        }
        // Show compound cards
        if(hasCompounds){
          if(!hasElements){
            const newLabel=document.createElement('div');
            newLabel.style.cssText='font-size:9px;color:#D4AF37;margin-bottom:6px;font-weight:600;';
            newLabel.textContent='★ NEW — Compounds fill this gap:';
            col.appendChild(newLabel);
          }
          const ed=document.createElement('div');ed.className='role-elements';
          cmpRoles[rid].forEach(c=>{ed.appendChild(createCard(c));});
          col.appendChild(ed);
        }
      }
      grid.appendChild(col);
    });
    section.appendChild(grid);main.appendChild(section);
  });

  // Gap summary panel
  renderGapPanel(elRoles,cmpRoles,bo);
}

function renderGapPanel(elRoles,cmpRoles,bo){
  const panel=document.getElementById('gapPanel');
  if(!selectedBand){panel.style.display='none';return;}
  panel.style.display='block';

  const checkRoles=['conductor','reflector','refractor','resistor','polarizer','converter','insulator','absorber'];

  // Elements only
  const elFilled=checkRoles.filter(r=>elRoles[r]&&elRoles[r].length>0).length;
  // Elements + Compounds
  const totalFilled=checkRoles.filter(r=>(elRoles[r]&&elRoles[r].length>0)||(cmpRoles[r]&&cmpRoles[r].length>0)).length;
  const total=checkRoles.length;
  const elPct=Math.round(elFilled/total*100);
  const totalPct=Math.round(totalFilled/total*100);
  const improvement=totalFilled-elFilled;

  let h='<div class="gap-title">Control Completeness for <span style="color:'+bo.color+'">'+bo.name+'</span></div>';

  // Elements-only bar
  h+='<div style="font-size:10px;color:#666;margin-bottom:4px">Elements only: '+elFilled+'/'+total+' roles ('+elPct+'%)</div>';
  h+='<div style="background:rgba(255,255,255,0.05);border-radius:4px;height:6px;margin-bottom:8px;overflow:hidden"><div style="height:100%;width:'+elPct+'%;background:rgba(255,255,255,0.2);border-radius:4px;transition:width 0.5s"></div></div>';

  // Elements + Compounds bar
  h+='<div style="font-size:10px;color:#D4AF37;margin-bottom:4px">Elements + Compounds: '+totalFilled+'/'+total+' roles ('+totalPct+'%)';
  if(improvement>0)h+=' — <span style="color:#2A9D8F">+'+improvement+' role'+(improvement!==1?'s':'')+' gained</span>';
  h+='</div>';
  h+='<div style="background:rgba(255,255,255,0.05);border-radius:4px;height:8px;margin-bottom:16px;overflow:hidden"><div style="height:100%;width:'+totalPct+'%;background:linear-gradient(90deg,#D4AF37,#2A9D8F,'+(totalPct<100?'#E63946':'#2A9D8F')+');border-radius:4px;transition:width 0.5s"></div></div>';

  // Role-by-role breakdown
  h+='<div class="gap-grid">';
  const groupLabels={conductor:'CHANGE',reflector:'CHANGE',refractor:'CHANGE',resistor:'CHANGE',polarizer:'CHANGE',converter:'CHANGE',insulator:'STOP',absorber:'STOP'};
  checkRoles.forEach(rid=>{
    const role=getRF(rid);
    const elCount=elRoles[rid]?elRoles[rid].length:0;
    const cmpCount=cmpRoles[rid]?cmpRoles[rid].length:0;
    const hasEl=elCount>0;
    const hasCmp=cmpCount>0;
    const found=hasEl||hasCmp;
    const newFromCmp=!hasEl&&hasCmp;

    let bg,border,tc;
    if(newFromCmp){
      bg='rgba(212,175,55,0.15)';border='1px solid rgba(212,175,55,0.4)';tc='#D4AF37';
    }else if(found){
      bg=RC[rid].bg;border='1px solid '+RC[rid].text;tc=RC[rid].text;
    }else{
      bg='rgba(255,50,50,0.1)';border='1px dashed #FF4444';tc='#FF6666';
    }

    h+='<div class="gap-item" style="background:'+bg+';border:'+border+'">';
    h+='<div class="gap-item-label" style="color:'+(found?'rgba(255,255,255,0.4)':'#FF4444')+'">'+groupLabels[rid]+'</div>';
    h+='<div class="gap-item-name" style="color:'+tc+'">'+role.icon+' '+role.name+'</div>';

    if(newFromCmp){
      h+='<div class="gap-item-status" style="color:#D4AF37">★ '+cmpCount+' compound'+(cmpCount!==1?'s':'')+'</div>';
      h+='<div class="gap-item-detail" style="color:#2A9D8F">Gap filled by compounds</div>';
    }else if(found){
      let status='✓ '+elCount+' element'+(elCount!==1?'s':'');
      if(hasCmp)status+=' + '+cmpCount+' cmp';
      h+='<div class="gap-item-status" style="color:rgba(255,255,255,0.5)">'+status+'</div>';
    }else{
      h+='<div class="gap-item-status" style="color:#FF6666">✗ GAP — still open</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  panel.innerHTML=h;
}

function renderDetail(){
  const panel=document.getElementById('detailPanel');
  if(!selectedCompound){panel.className='detail-panel';panel.innerHTML='';return;}
  panel.className='detail-panel open';
  const c=selectedCompound;

  let h='<div class="detail-top"><div>';
  h+='<span class="detail-formula">'+c.formula+'</span>';
  h+='<span class="detail-name">'+c.name+'</span>';
  h+='<span class="detail-density">'+c.density+' g/cm³</span>';
  h+='</div><button class="close-btn" onclick="selectedCompound=null;render();">✕</button></div>';

  h+='<div class="detail-elements">Elements: '+c.elements.join(' · ')+'</div>';
  h+='<div class="detail-notes">'+c.notes+'</div>';

  // EM Spectrum
  h+='<div class="detail-section-label">EM Spectrum</div><div class="detail-grid">';
  EM_BANDS.forEach(band=>{
    const roles=c.bands[band.id]||[];
    const hl=selectedBand===band.id?' highlighted':'';
    const bs=selectedBand===band.id?'border:1px solid '+band.color:'';
    h+='<div class="detail-band-card'+hl+'" style="'+bs+'"><div class="detail-band-name" style="color:'+band.color+'">'+band.name+'</div>';
    if(roles.length>0){
      roles.forEach(r=>{
        const ro=getRF(r);
        if(ro)h+='<span class="detail-role-badge" style="background:'+RC[r].bg+';color:'+RC[r].text+'">'+ro.icon+' '+r+'</span>';
      });
    }else{
      h+='<span class="detail-no-data">No data</span>';
    }
    h+='</div>';
  });
  h+='</div>';

  // Thermal
  h+='<div class="detail-section-label">Thermal</div><div class="detail-grid">';
  THERMAL_BANDS.forEach(band=>{
    const roles=c.bands[band.id]||[];
    const hl=selectedBand===band.id?' highlighted':'';
    const bs=selectedBand===band.id?'border:1px solid '+band.color:'';
    h+='<div class="detail-band-card'+hl+'" style="'+bs+'"><div class="detail-band-name" style="color:'+band.color+'">'+band.name+'</div>';
    if(roles.length>0){
      roles.forEach(r=>{
        const ro=getRF(r);
        if(ro)h+='<span class="detail-role-badge" style="background:'+RC[r].bg+';color:'+RC[r].text+'">'+ro.icon+' '+r+'</span>';
      });
    }else{
      h+='<span class="detail-no-data">No data</span>';
    }
    h+='</div>';
  });
  h+='</div>';

  // Kinetic Particles
  h+='<div class="detail-section-label">Kinetic Particles</div><div class="detail-grid">';
  KINETIC_BANDS.filter(b=>b.developed).forEach(band=>{
    const roles=c.bands[band.id]||[];
    const hl=selectedBand===band.id?' highlighted':'';
    const bs=selectedBand===band.id?'border:1px solid '+band.color:'';
    h+='<div class="detail-band-card'+hl+'" style="'+bs+'"><div class="detail-band-name" style="color:'+band.color+'">'+band.name+'</div>';
    if(roles.length>0){
      roles.forEach(r=>{
        const ro=getRF(r);
        if(ro)h+='<span class="detail-role-badge" style="background:'+RC[r].bg+';color:'+RC[r].text+'">'+ro.icon+' '+r+'</span>';
      });
    }else{
      h+='<span class="detail-no-data">No data</span>';
    }
    h+='</div>';
  });
  h+='</div>';

  // Cross-reference: show component elements
  h+='<div class="detail-section-label">Component Elements</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
  c.elements.forEach(sym=>{
    const el=ELEMENTS.find(e=>e.symbol===sym);
    if(!el)return;
    h+='<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:8px 12px;min-width:80px;text-align:center">';
    h+='<div style="font-size:10px;color:rgba(255,255,255,0.4);font-family:JetBrains Mono,monospace">'+el.Z+'</div>';
    h+='<div style="font-size:20px;font-weight:700;color:#CCCCDD;font-family:JetBrains Mono,monospace">'+el.symbol+'</div>';
    h+='<div style="font-size:9px;color:rgba(255,255,255,0.5)">'+el.name+'</div>';
    h+='</div>';
  });
  h+='</div>';

  panel.innerHTML=h;
}

function renderFooter(){
  const cats={};COMPOUNDS.forEach(c=>{cats[c.category]=(cats[c.category]||0)+1;});
  const catStr=Object.keys(cats).map(k=>{
    const cat=COMPOUND_CATEGORIES.find(c=>c.id===k);
    return (cat?cat.name:k)+': '+cats[k];
  }).join(', ');
  document.getElementById('footer').innerHTML='<strong>Spectrum Compounds Chart</strong> — '+COMPOUNDS.length+' compounds ('+catStr+'), '+ALL_BANDS.length+' energy bands ('+EM_BANDS.length+' EM + '+THERMAL_BANDS.length+' thermal + '+KINETIC_BANDS.filter(b=>b.developed).length+' kinetic), '+ROLES.length+' functional roles. Compounds extend the element-only framework toward practical, engineered energy control.<div class="copyright">© 2025 David R. Young — Spectrum Energy Research Corp<br>Spectrum Energy Research Framework · All Rights Reserved</div>';
}

function render(){
  renderBandBar();
  renderLegend();
  if(currentView==='general'){
    renderGeneral();
    document.getElementById('gapPanel').style.display='none';
  }else{
    renderGapAnalysis();
  }
  renderDetail();
  renderFooter();
}

// View toggle wiring
document.getElementById('viewToggle').addEventListener('click',function(e){
  if(!e.target.classList.contains('view-btn'))return;
  const view=e.target.dataset.view;
  currentView=view;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  const desc=document.getElementById('viewDesc');
  desc.textContent=view==='general'?'What does each compound do across all bands?':'Where do compounds fill control gaps that elements can\'t?';
  selectedCompound=null;
  render();
});

document.getElementById('searchInput').addEventListener('input',function(e){searchText=e.target.value;render();});
render();
</script>
